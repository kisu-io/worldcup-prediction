name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        env:
          VITE_SUPABASE_URL: https://rofwhndjmidfttszuwts.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_kHvVfhBxPrpx-LUyKIOdgw_D2_nbJov
          VITE_SUPABASE_EDGE_BASE: https://rofwhndjmidfttszuwts.supabase.co/functions/v1
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
